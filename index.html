<!DOCTYPE html>
<html>
<head>
    <title>Tilt Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: black;
            display: flex;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .eye {
            width: 50vw;
            height: 50vw;
            background: white;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transform: scaleY(0);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .eye.open { transform: scaleY(1); }
        .eye.open.unhappy { transform: scaleY(1); }

        /* Concerned brow: diagonal black band across the inner-top of each eye */
        .eye.open.unhappy::before {
            content: '';
            position: absolute;
            background: black;
            width: 100%;
            height: 45%;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #leftEye.open.unhappy::before {
            transform-origin: 0% 0%;
            transform: rotate(-22deg);
        }
        #rightEye.open.unhappy::before {
            transform-origin: 100% 0%;
            transform: rotate(22deg);
        }

        .pupil {
            width: 44%;
            height: 44%;
            background: #111;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.25s ease;
        }

        #start {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-family: sans-serif;
            font-size: 18px;
            cursor: pointer;
        }


        #voice-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: none;
            border: 1px solid #333;
            color: #555;
            font-family: monospace;
            font-size: 12px;
            padding: 3px 7px;
            cursor: pointer;
            border-radius: 3px;
        }

        #voice-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            overflow-y: auto;
            z-index: 10;
            padding: 16px;
        }

        #voice-panel.open { display: block; }

        #voice-panel h2 {
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .voice-item {
            padding: 12px 8px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            font-family: monospace;
            font-size: 13px;
            color: #888;
        }

        .voice-item.selected { color: #fff; }
        .voice-item .lang { color: #444; font-size: 11px; margin-top: 2px; }
        .voice-item .network { color: #5a5; font-size: 10px; margin-left: 6px; }

        #voice-hint {
            color: #444;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.6;
            margin-bottom: 12px;
            border-left: 2px solid #333;
            padding-left: 8px;
        }

        #voice-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px 0 16px;
            border-bottom: 1px solid #222;
            margin-bottom: 4px;
        }
        #voice-controls label {
            color: #888;
            font-family: monospace;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #voice-controls input[type=range] { flex: 1; accent-color: #aaa; }
        #voice-controls span { min-width: 28px; }

        #delta-display {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-family: monospace;
            font-size: 88px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0.75;
            letter-spacing: -2px;
        }
    </style>
</head>
<body>
    <div class="eye" id="leftEye"><div class="pupil" id="leftPupil"></div></div>
    <div class="eye" id="rightEye"><div class="pupil" id="rightPupil"></div></div>
    <div id="start">tap to start</div>
    <button id="voice-btn">voice</button>
    <div id="voice-panel">
        <h2>choose a voice</h2>
        <p id="voice-hint">On Android, install more voices via:<br>Settings → General Management → Language &amp; Input → Text-to-speech → Google Text-to-Speech → Install voice data → English (UK)</p>
        <div id="voice-controls">
            <label>rate <span id="rate-val">0.9</span><input id="rate-slider" type="range" min="0.5" max="1.5" step="0.05" value="0.9"></label>
            <label>pitch <span id="pitch-val">1.0</span><input id="pitch-slider" type="range" min="0.5" max="2" step="0.05" value="1.0"></label>
        </div>
        <div id="voice-list"></div>
    </div>
    <div id="build" style="position:fixed;top:10px;right:10px;color:#333;font-family:monospace;font-size:12px;pointer-events:none;"></div>
    <div id="delta-display">--</div>

    <script>
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const leftPupil = document.getElementById('leftPupil');
        const rightPupil = document.getElementById('rightPupil');

        let awake = false;
        let happy = true;
        let sleepTimer = null;
        let lookTimer = null;
        let lastBeta = null;
        let lastGamma = null;
        let anchorBeta = null;
        let closedSince = null;
        let motionSamples = [];
        let calibrationSamples = [];

        // Voice selection — store by name so the reference survives voiceschanged
        let selectedVoiceName = 'Google UK English Female';
        let voiceRate = 0.85;
        let voicePitch = 1.0;
        const voicePanel = document.getElementById('voice-panel');
        const voiceList = document.getElementById('voice-list');

        const rateSlider = document.getElementById('rate-slider');
        const rateVal = document.getElementById('rate-val');
        const pitchSlider = document.getElementById('pitch-slider');
        const pitchVal = document.getElementById('pitch-val');

        rateSlider.addEventListener('input', () => {
            voiceRate = Number(rateSlider.value);
            rateVal.textContent = voiceRate.toFixed(2);
        });
        pitchSlider.addEventListener('input', () => {
            voicePitch = Number(pitchSlider.value);
            pitchVal.textContent = voicePitch.toFixed(2);
        });

        function getVoice() {
            // Re-fetch every time — voice objects can go stale on Android
            return speechSynthesis.getVoices().find(v => v.name === selectedVoiceName) ?? null;
        }

        function makeUtterance(text) {
            const u = new SpeechSynthesisUtterance(text);
            const voice = getVoice();
            if (voice) {
                u.voice = voice;
                u.lang = voice.lang; // helps Android route to the correct accent engine
            }
            u.rate = voiceRate;
            u.pitch = voicePitch;
            return u;
        }

        function isQuietHours() {
            const hour = Number(new Intl.DateTimeFormat('en-US', {
                hour: 'numeric', hour12: false, timeZone: 'America/Los_Angeles'
            }).format(new Date()));
            return hour >= 21 || hour < 7;
        }

        function speak(text) {
            if (isQuietHours()) return;
            // cancel + small delay works around Android Chrome ignoring voice in timers
            speechSynthesis.cancel();
            setTimeout(() => speechSynthesis.speak(makeUtterance(text)), 50);
        }

        function buildVoiceList() {
            const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
            if (!voices.length) return;
            if (!selectedVoiceName) {
                const def = voices.find(v => v.name === 'Google UK English Female');
                if (def) selectedVoiceName = def.name;
            }
            voiceList.innerHTML = '';
            voices.forEach(v => {
                const el = document.createElement('div');
                el.className = 'voice-item' + (v.name === selectedVoiceName ? ' selected' : '');
                const network = !v.localService ? '<span class="network">network</span>' : '';
                el.innerHTML = `${v.name}${network}<div class="lang">${v.lang}</div>`;
                el.addEventListener('click', () => {
                    selectedVoiceName = v.name;
                    voicePanel.classList.remove('open');
                    document.querySelectorAll('.voice-item').forEach(e => e.classList.remove('selected'));
                    el.classList.add('selected');
                    speak(pickNagLine());
                });
                voiceList.appendChild(el);
            });
        }

        speechSynthesis.addEventListener('voiceschanged', buildVoiceList);
        buildVoiceList();

        document.getElementById('voice-btn').addEventListener('click', () => {
            buildVoiceList();
            voicePanel.classList.toggle('open');
        });

        const threshold = 1.75;

        function deltaAngle(beta) {
            return Math.abs(((beta - 90 + 540) % 360) - 180);
        }

        function isFullyOpen(beta) {
            // Screen facing ground = door all the way open, delta ~90°
            return Math.abs(deltaAngle(beta) - 90) <= 10;
        }

        function angleDiff(a, b) {
            return ((a - b + 540) % 360) - 180;
        }

        function isVertical(beta) {
            if (anchorBeta === null) return false;
            return Math.abs(angleDiff(beta, anchorBeta)) < threshold;
        }

        function updateCalibration(beta, gamma, rawMotion) {
            if (anchorBeta !== null) return;
            if (isFullyOpen(beta)) {
                calibrationSamples = [];
                return;
            }
            if (Math.abs(gamma) > 12) {
                calibrationSamples = [];
                return;
            }
            if (rawMotion > 1.2) {
                calibrationSamples = [];
                return;
            }
            calibrationSamples.push(beta);
            if (calibrationSamples.length > 10) calibrationSamples.shift();
            if (calibrationSamples.length === 10) {
                const avgBeta = calibrationSamples.reduce((sum, sample) => sum + sample, 0) / calibrationSamples.length;
                const stable = calibrationSamples.every(sample => Math.abs(angleDiff(sample, avgBeta)) < threshold);
                if (stable) anchorBeta = avgBeta;
            }
        }

        function setPupils(x, y) {
            const t = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            leftPupil.style.transform = t;
            rightPupil.style.transform = t;
        }

        function pupilMax() {
            // eye radius minus pupil radius (both in px at runtime)
            return leftEye.offsetWidth * 0.5 - leftEye.offsetWidth * 0.22;
        }

        function scheduleLook() {
            clearTimeout(lookTimer);
            lookTimer = setTimeout(() => {
                if (!awake || !happy) return;
                const max = pupilMax();
                setPupils(
                    (Math.random() * 2 - 1) * max,
                    (Math.random() * 2 - 1) * max
                );
                scheduleLook();
            }, 400 + Math.random() * 1200);
        }

        const nagLines = [
            "Were you born in a field or just raised by wolves? Close the dishwasher.",
            "The dishes aren't going to wash themselves with the door open. Shut it.",
            "It's a dishwasher door, not a suggestion. Shut it.",
            "If I wanted steam in my kitchen, I'd boil pasta. Close the dishwasher.",
            "Unless you're waiting for the dishes to leap out and dry themselves, shut the dishwasher.",
            "The hinge isn't just for decoration — shut the dishwasher door.",
            "I didn't realise we were giving the steam a tour of the cabinets. Close the dishwasher.",
            "Finish the job. Latch the dishwasher.",
            "My electricity bill is crying, and so am I. Shut the dishwasher door.",
            "Close the dishwasher before the steam redecorates the kitchen.",
            "Were you born in a barn or just allergic to latches? Close the dishwasher.",
            "Close the dishwasher before the humidity claims the floorboards.",
            "I'm not paying to steam-clean the entire kitchen. Shut the dishwasher door.",
            "It's a dishwasher door, not a ventilation system. Close it.",
            "The gap between the door and the machine is not a design feature. Close the dishwasher.",
            "Did the dishwasher personally offend you, or can you close it?",
            "The dishes aren't going to gossip about it — just shut the dishwasher.",
            "If I wanted a steam room, I'd join a gym. Shut the dishwasher door.",
            "Put the closed back in enclosed cycle — shut the dishwasher door.",
            "Your loading was a ten, but your exit is a please shut the dishwasher.",
            "The dishwasher works better when it's, you know, closed. Shut it.",
            "Hot water, soap, spinning arms — all useless if you don't close the door. Shut it.",
            "One latch. That's all I'm asking. Close the dishwasher.",
            "The dishwasher is not a sculpture. It has a function. Close the door.",
            "You put in the effort to load it. Don't quit at the finish line. Shut the dishwasher.",
            "A closed dishwasher is a happy dishwasher. Shut the door.",
            "The water isn't going to stay in there on its own. Close the dishwasher door.",
            "Were you raised by someone who also left the dishwasher open? Break the cycle. Close it.",
            "The dishwasher has one request. Just one. Close the door.",
            "I've seen revolving doors with more commitment. Shut the dishwasher.",
            "Even the dirty dishes are embarrassed right now. Close the dishwasher door.",
            "The latch exists for a reason. Use it. Shut the dishwasher door.",
            "A little click is all it takes. Shut the dishwasher door.",
            "If the dishwasher had feelings, they'd be hurt right now. Close the door.",
            "This is not how dishwashers were meant to live. Shut the door.",
            "You've come so far. Don't give up now. Close the dishwasher.",
            "The dishwasher is judging you. And so am I. Close the door.",
            "Soap is in. Dishes are in. Door is… not closed. Fix that. Shut the dishwasher.",
            "The rinse cycle is not a spectator sport. Close the dishwasher door.",
            "Your dishes deserve better than this. Close the dishwasher.",
            "I don't ask for much. Just a closed dishwasher. Shut it.",
            "The steam is escaping. Your will to finish things is also escaping. Close the dishwasher.",
            "Leaving the dishwasher open is a choice. A bad one. Shut it.",
            "The dishwasher can't do its one job with the door open. Close it.",
            "If you walked away before closing it, walk back. Shut the dishwasher.",

            // Round 2 — more wit, more variance
            "The dishwasher called. It's not angry, just disappointed. Close the door.",
            "Somewhere in a parallel universe, you closed it. Be that person. Shut the dishwasher.",
            "If leaving the dishwasher open were an Olympic sport, you'd be defending champion. Close it.",
            "The energy required to close this door is approximately zero. And yet. Shut the dishwasher.",
            "Not all heroes wear capes. Some just close the dishwasher. Be a hero.",
            "I'm legally obligated to inform you the dishwasher is still open. Shut it.",
            "The dishes are clean. The door is open. One of these things is unacceptable. Close it.",
            "Five stars for loading. Zero stars for closing. Shut the dishwasher door.",
            "The warranty doesn't cover emotional damage from being left open. Close the dishwasher.",
            "In the time you haven't closed this, you could have learned a language. Close the dishwasher.",
            "You had one job after loading. Just one. Shut the dishwasher.",
            "The dishwasher is not a fish tank. There's nothing to watch. Close the door.",
            "I've asked nicely. I've asked firmly. Now I'm asking with increasing desperation. Close the dishwasher.",
            "Gravity works. Dishes don't clean themselves. Doors don't close themselves. Shut the dishwasher.",
            "Consider this a formal notice: the dishwasher requires closure. Shut the door.",
            "The kitchen humidity has filed a complaint. Close the dishwasher door.",
            "Your future self, standing on dry floorboards, is begging you. Shut the dishwasher.",
            "Progress is a closed dishwasher. Make progress. Shut it.",
            "The steam is not an aesthetic. Close the dishwasher door.",
            "I'm running out of ways to ask this. I've written fifty. Close the dishwasher.",
            "A closed dishwasher is a promise kept. Keep your promise. Shut the door.",
            "Some people say the journey is the destination. Those people have never left a dishwasher open. Close it.",
            "The door is not a philosophical statement. It's a door. Shut the dishwasher.",
            "If there were a Nobel Prize for leaving dishwashers open, you'd have several. Close it.",
            "The world is full of unfinished things. Don't add to the pile. Close the dishwasher.",
            "Imagine a world where you closed the dishwasher. Now make it real. Shut the door.",
            "We need to talk about the dishwasher. Specifically, how it's open. Close it.",
            "The hinges are load-bearing disappointment until you use them. Shut the dishwasher.",
            "You're better than this. I genuinely believe that. Close the dishwasher.",
            "The open door is a cry for help from the dishwasher. Answer it. Shut the door.",
            "Nothing says 'I live here' like a closed dishwasher. Claim your space. Shut the door.",
            "The dishes have been through enough today. Don't leave them hanging. Close the dishwasher.",
            "Time is a flat circle, and this dishwasher will always be open unless you close it. Shut the door.",
            "I've been very patient. More patient than the door deserves. Shut the dishwasher.",
            "Not every story has a happy ending, but this one can. Close the dishwasher.",
            "The dishwasher repairman gets a commission every time this stays open. Don't fund him. Shut it.",
            "It takes one person to close a dishwasher. Be that person. Shut the door.",
            "The definition of optimism is loading a dishwasher and not closing the door. Don't be optimistic. Shut it.",
            "I've seen kettles with better follow-through. Close the dishwasher door.",
            "This is not a drill. The dishwasher is open. Shut it.",
            "The steam is staging an escape. Don't let it win. Close the dishwasher.",
            "Somewhere, a mug is getting cold because of this. Close the dishwasher door.",
            "I don't make the rules. Actually, I do. Close the dishwasher.",
            "The dishwasher has seen things. None of them as bad as this moment. Shut the door.",
            "Technically, the dishwasher is half-done. Finish it. Close the door.",
            "If the dishwasher could leave, it would. Don't give it a reason. Shut the door.",
            "History will not remember who left the dishwasher open, but I will. Close it.",
            "The door is ajar. A jar belongs in the dishwasher. Close the dishwasher.",
            "Every open dishwasher door is a micro-tragedy. End the tragedy. Shut it.",
            "I asked the dishwasher how it was doing. It said 'open'. Close the door.",
            "Low effort, high reward: just close the dishwasher. Shut it.",
            "The steam has left the building. But the door is still open. Close the dishwasher.",
            "Closing the dishwasher is an act of love. Love yourself. Shut the door.",
            "It's giving 'someone else will deal with it'. Shut the dishwasher.",
        ];
        let lastNagIndex = -1;

        function pickNagLine() {
            let i;
            do { i = Math.floor(Math.random() * nagLines.length); } while (i === lastNagIndex);
            lastNagIndex = i;
            return nagLines[i];
        }

        let nagTimer = null;

        function startNagging() {
            if (nagTimer) return;
            nagTimer = setInterval(() => speak(pickNagLine()), 20000);
        }

        function stopNagging() {
            clearInterval(nagTimer);
            nagTimer = null;
            speechSynthesis.cancel();
        }

        function updateNagging(beta) {
            if (awake && !happy && !isFullyOpen(beta)) {
                startNagging();
            } else {
                stopNagging();
            }
        }

        function setMood(vertical) {
            if (vertical === happy) return;
            happy = vertical;
            if (happy) {
                leftEye.classList.remove('unhappy');
                rightEye.classList.remove('unhappy');
                scheduleLook();
            } else {
                clearTimeout(lookTimer);
                lookTimer = null;
                leftEye.classList.add('unhappy');
                rightEye.classList.add('unhappy');
                setPupils(0, -pupilMax() * 0.5);
            }
        }

        function wakeUp(beta) {
            clearTimeout(sleepTimer);
            if (!awake) {
                awake = true;
                happy = isVertical(beta);
                setPupils(0, happy ? 0 : -pupilMax() * 0.5);
                leftEye.classList.add('open');
                rightEye.classList.add('open');
                if (happy) {
                    leftEye.classList.remove('unhappy');
                    rightEye.classList.remove('unhappy');
                    scheduleLook();
                } else {
                    leftEye.classList.add('unhappy');
                    rightEye.classList.add('unhappy');
                }
            }
        }

        function sleep() {
            if (!happy) return;
            awake = false;
            closedSince = null;
            clearTimeout(lookTimer);
            lookTimer = null;
            clearTimeout(sleepTimer);
            sleepTimer = null;
            setPupils(0, 0);
            leftEye.classList.remove('open', 'unhappy');
            rightEye.classList.remove('open', 'unhappy');
            updateNagging(lastBeta ?? 90);
        }

        function handleOrientation(event) {
            if (event.beta === null || event.gamma === null) return;
            if (lastBeta === null) {
                lastBeta = event.beta;
                lastGamma = event.gamma;
                // Capture anchor immediately from the first reading if the phone is in a
                // plausible closed position (not flat, not wildly tilted sideways).
                if (!isFullyOpen(event.beta) && Math.abs(event.gamma) <= 15) {
                    anchorBeta = event.beta;
                    const deltaEl = document.getElementById('delta-display');
                    if (deltaEl) deltaEl.textContent = '0.0°';
                }
                return;
            }
            const db = Math.abs(event.beta - lastBeta);
            const dg = Math.abs(event.gamma - lastGamma);
            lastBeta = event.beta;
            lastGamma = event.gamma;

            const rawMotion = Math.max(db, dg);
            updateCalibration(event.beta, event.gamma, rawMotion);

            const deltaEl = document.getElementById('delta-display');
            if (deltaEl) {
                if (anchorBeta !== null) {
                    deltaEl.textContent = Math.abs(angleDiff(event.beta, anchorBeta)).toFixed(1) + '°';
                } else {
                    deltaEl.textContent = '--';
                }
            }
            const vertical = isVertical(event.beta);
            motionSamples.push(rawMotion);
            if (motionSamples.length > 10) motionSamples.shift();
            const avgMotion = motionSamples.reduce((sum, sample) => sum + sample, 0) / motionSamples.length;
            const moved = avgMotion > 0.6;
            const strongMotion = avgMotion > 2.2;

            if ((!awake && !vertical) || (awake && moved) || (!awake && vertical && strongMotion)) wakeUp(event.beta);

            if (awake) {
                setMood(vertical);
                updateNagging(event.beta);

                if (vertical) {
                    if (closedSince === null) closedSince = Date.now();
                    clearTimeout(sleepTimer);
                    const stableClosedMs = Date.now() - closedSince;
                    const remainingMs = Math.max(0, 4000 - stableClosedMs);
                    sleepTimer = setTimeout(sleep, remainingMs);
                } else {
                    closedSince = null;
                    clearTimeout(sleepTimer);
                    sleepTimer = null;
                }
            }
        }

        function startListening() {
            window.addEventListener('deviceorientation', handleOrientation);
            const el = document.getElementById('start');
            if (el) el.remove();
        }

        fetch('https://api.github.com/repos/ajones/washer-tilt/commits/main')
            .then(r => r.json())
            .then(d => { document.getElementById('build').textContent = 'build: ' + d.sha.slice(0, 7); })
            .catch(() => {});

        // Fullscreen on tap anywhere outside the controls
        document.addEventListener('click', (e) => {
            if (!document.fullscreenElement && !e.target.closest('#voice-btn, #voice-panel')) {
                document.documentElement.requestFullscreen?.().catch(() => {});
            }
        });

        // Burn-in prevention: drift static overlays by a few px every 30s
        const burnInEls = [document.getElementById('build'), document.getElementById('voice-btn')];
        setInterval(() => {
            burnInEls.forEach(el => {
                const x = (Math.random() * 6 - 3).toFixed(1);
                const y = (Math.random() * 6 - 3).toFixed(1);
                el.style.transform = `translate(${x}px, ${y}px)`;
            });
        }, 30000);

        // iOS 13+ requires explicit permission via user gesture
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.getElementById('start').addEventListener('click', async () => {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') startListening();
            });
        } else {
            // Android / desktop — no permission needed, start immediately
            startListening();
        }
    </script>
</body>
</html>
