<!DOCTYPE html>
<html>
<head>
    <title>Tilt Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: black;
            display: flex;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .eye {
            width: 50vw;
            height: 50vw;
            background: white;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transform: scaleY(0);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .eye.open { transform: scaleY(1); }
        .eye.open.unhappy { transform: scaleY(1); }

        /* Concerned brow: diagonal black band across the inner-top of each eye */
        .eye.open.unhappy::before {
            content: '';
            position: absolute;
            background: black;
            width: 100%;
            height: 45%;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #leftEye.open.unhappy::before {
            transform-origin: 0% 0%;
            transform: rotate(-22deg);
        }
        #rightEye.open.unhappy::before {
            transform-origin: 100% 0%;
            transform: rotate(22deg);
        }

        .pupil {
            width: 44%;
            height: 44%;
            background: #111;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.25s ease;
        }

        #start {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-family: sans-serif;
            font-size: 18px;
            cursor: pointer;
        }

        #threshold-ui {
            position: fixed;
            bottom: 36px;
            left: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            pointer-events: none;
        }

        #threshold-label {
            color: #aaa;
            font-family: monospace;
            font-size: 13px;
        }

        #threshold-slider {
            pointer-events: all;
            width: 140px;
            accent-color: #aaa;
        }

        #voice-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: none;
            border: 1px solid #333;
            color: #555;
            font-family: monospace;
            font-size: 12px;
            padding: 3px 7px;
            cursor: pointer;
            border-radius: 3px;
        }

        #voice-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            overflow-y: auto;
            z-index: 10;
            padding: 16px;
        }

        #voice-panel.open { display: block; }

        #voice-panel h2 {
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .voice-item {
            padding: 12px 8px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            font-family: monospace;
            font-size: 13px;
            color: #888;
        }

        .voice-item.selected { color: #fff; }
        .voice-item .lang { color: #444; font-size: 11px; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="eye" id="leftEye"><div class="pupil" id="leftPupil"></div></div>
    <div class="eye" id="rightEye"><div class="pupil" id="rightPupil"></div></div>
    <div id="start">tap to start</div>
    <button id="voice-btn">voice</button>
    <div id="voice-panel">
        <h2>choose a voice</h2>
        <div id="voice-list"></div>
    </div>
    <div id="debug" style="position:fixed;bottom:10px;left:10px;color:#fff;font-family:monospace;font-size:13px;pointer-events:none;"></div>
    <div id="build" style="position:fixed;top:10px;right:10px;color:#333;font-family:monospace;font-size:12px;pointer-events:none;"></div>
    <div id="threshold-ui">
        <div id="threshold-label">±15°</div>
        <input id="threshold-slider" type="range" min="1" max="45" value="3">
    </div>

    <script>
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const leftPupil = document.getElementById('leftPupil');
        const rightPupil = document.getElementById('rightPupil');

        let awake = false;
        let happy = true;
        let sleepTimer = null;
        let lookTimer = null;
        let lastBeta = null;
        let lastGamma = null;

        // Voice selection
        let selectedVoice = null;
        const voicePanel = document.getElementById('voice-panel');
        const voiceList = document.getElementById('voice-list');

        function buildVoiceList() {
            const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
            if (!voices.length) return;
            if (!selectedVoice) {
                selectedVoice = voices.find(v => v.name === 'Google UK English Female') ?? null;
            }
            voiceList.innerHTML = '';
            voices.forEach((v, i) => {
                const el = document.createElement('div');
                el.className = 'voice-item' + (v === selectedVoice ? ' selected' : '');
                el.innerHTML = `${v.name}<div class="lang">${v.lang}</div>`;
                el.addEventListener('click', () => {
                    selectedVoice = v;
                    voicePanel.classList.remove('open');
                    document.querySelectorAll('.voice-item').forEach(e => e.classList.remove('selected'));
                    el.classList.add('selected');
                    const preview = new SpeechSynthesisUtterance(pickNagLine());
                    preview.voice = v;
                    preview.rate = 0.9;
                    speechSynthesis.speak(preview);
                });
                voiceList.appendChild(el);
            });
        }

        speechSynthesis.addEventListener('voiceschanged', buildVoiceList);
        buildVoiceList();

        document.getElementById('voice-btn').addEventListener('click', () => {
            buildVoiceList();
            voicePanel.classList.toggle('open');
        });

        let threshold = 3;

        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdLabel = document.getElementById('threshold-label');
        thresholdSlider.value = threshold;
        thresholdLabel.textContent = `±${threshold}°`;
        thresholdSlider.addEventListener('input', () => {
            threshold = Number(thresholdSlider.value);
            thresholdLabel.textContent = `±${threshold}°`;
        });

        function isVertical(beta) {
            // Angular distance from 90° (upright), accounting for 360° wrap
            const diff = ((beta - 90 + 540) % 360) - 180;
            return Math.abs(diff) < threshold;
        }

        function setPupils(x, y) {
            const t = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            leftPupil.style.transform = t;
            rightPupil.style.transform = t;
        }

        function pupilMax() {
            // eye radius minus pupil radius (both in px at runtime)
            return leftEye.offsetWidth * 0.5 - leftEye.offsetWidth * 0.22;
        }

        function scheduleLook() {
            clearTimeout(lookTimer);
            lookTimer = setTimeout(() => {
                if (!awake || !happy) return;
                const max = pupilMax();
                setPupils(
                    (Math.random() * 2 - 1) * max,
                    (Math.random() * 2 - 1) * max
                );
                scheduleLook();
            }, 400 + Math.random() * 1200);
        }

        const nagLines = [
            "Were you born in a field or just raised by wolves? Close the door.",
            "Close the door, I'm not paying to air-condition the entire neighborhood.",
            "It's a door, not a suggestion. Shut it.",
            "If I wanted to live outside, I'd be in a tent. Close the door.",
            "Unless you're waiting for a parade to march through, shut it.",
            "The hinge isn't just for decoration — shut the door.",
            "I didn't realize we were hosting a gala for all the local flies. Close the door.",
            "Finish the job; latch the portal.",
            "My electric bill is crying, and so am I. Shut the door.",
            "Close it before the outside realizes how much better it is in here.",
            "Were you born in a barn or just allergic to hinges? Close the door.",
            "Close it before the mosquitoes start claiming residency.",
            "I'm not subsidizing the neighborhood's heating bill. Shut the door.",
            "It's a door, not a portal to your personal fan club. Close it.",
            "Unless you're a draft, I don't want you coming through that gap. Shut the door.",
            "Did the door personally offend you, or can you close it?",
            "My privacy isn't a public exhibit; shut the gate.",
            "If I wanted a breeze, I'd stand in front of a fan. Shut the door.",
            "Put the closed back in enclosed space — shut the door.",
            "Your entry was a 10, but your exit is a please shut the door.",
        ];
        let lastNagIndex = -1;

        function pickNagLine() {
            let i;
            do { i = Math.floor(Math.random() * nagLines.length); } while (i === lastNagIndex);
            lastNagIndex = i;
            return nagLines[i];
        }

        let nagTimer = null;

        function startNagging() {
            if (nagTimer) return;
            nagTimer = setInterval(() => {
                const u = new SpeechSynthesisUtterance(pickNagLine());
                if (selectedVoice) u.voice = selectedVoice;
                u.rate = 0.9;
                speechSynthesis.speak(u);
            }, 20000);
        }

        function stopNagging() {
            clearInterval(nagTimer);
            nagTimer = null;
            speechSynthesis.cancel();
        }

        function setMood(vertical) {
            if (vertical === happy) return;
            happy = vertical;
            if (happy) {
                leftEye.classList.remove('unhappy');
                rightEye.classList.remove('unhappy');
                stopNagging();
                scheduleLook();
            } else {
                clearTimeout(lookTimer);
                lookTimer = null;
                leftEye.classList.add('unhappy');
                rightEye.classList.add('unhappy');
                setPupils(0, -pupilMax() * 0.5); // look up toward brow
                startNagging();
            }
        }

        function wakeUp(beta) {
            clearTimeout(sleepTimer);
            if (!awake) {
                awake = true;
                happy = isVertical(beta);
                setPupils(0, happy ? 0 : -pupilMax() * 0.5);
                leftEye.classList.add('open');
                rightEye.classList.add('open');
                if (happy) {
                    leftEye.classList.remove('unhappy');
                    rightEye.classList.remove('unhappy');
                    scheduleLook();
                } else {
                    leftEye.classList.add('unhappy');
                    rightEye.classList.add('unhappy');
                    startNagging();
                }
            }
            sleepTimer = setTimeout(sleep, 1000 + Math.random() * 9000);
        }

        function sleep() {
            if (!happy) return;
            awake = false;
            clearTimeout(lookTimer);
            lookTimer = null;
            setPupils(0, 0);
            leftEye.classList.remove('open', 'unhappy');
            rightEye.classList.remove('open', 'unhappy');
            stopNagging();
        }

        const debug = document.getElementById('debug');
        let eventCount = 0;

        function handleOrientation(event) {
            eventCount++;
            const fromVertical = event.beta != null
                ? Math.abs(((event.beta - 90 + 540) % 360) - 180).toFixed(1)
                : '?';
            debug.textContent = `β:${event.beta?.toFixed(1)} γ:${event.gamma?.toFixed(1)} Δvert:${fromVertical}° awake:${awake}`;
            if (event.beta === null || event.gamma === null) return;
            if (lastBeta === null) {
                lastBeta = event.beta;
                lastGamma = event.gamma;
                return;
            }
            const db = Math.abs(event.beta - lastBeta);
            const dg = Math.abs(event.gamma - lastGamma);
            lastBeta = event.beta;
            lastGamma = event.gamma;

            if (db > 0.5 || dg > 0.5) wakeUp(event.beta);
            if (awake) setMood(isVertical(event.beta));
        }

        function startListening() {
            window.addEventListener('deviceorientation', handleOrientation);
            const el = document.getElementById('start');
            if (el) el.remove();
        }

        fetch('https://api.github.com/repos/ajones/washer-tilt/commits/main')
            .then(r => r.json())
            .then(d => { document.getElementById('build').textContent = 'build: ' + d.sha.slice(0, 7); })
            .catch(() => {});

        // Fullscreen on tap anywhere outside the controls
        document.addEventListener('click', (e) => {
            if (!document.fullscreenElement && !e.target.closest('#threshold-ui, #voice-btn, #voice-panel')) {
                document.documentElement.requestFullscreen?.().catch(() => {});
            }
        });

        // Burn-in prevention: drift static overlays by a few px every 30s
        const burnInEls = [
            document.getElementById('debug'),
            document.getElementById('build'),
            document.getElementById('threshold-ui'),
        ];
        setInterval(() => {
            burnInEls.forEach(el => {
                const x = (Math.random() * 6 - 3).toFixed(1);
                const y = (Math.random() * 6 - 3).toFixed(1);
                el.style.transform = `translate(${x}px, ${y}px)`;
            });
        }, 30000);

        // iOS 13+ requires explicit permission via user gesture
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.getElementById('start').addEventListener('click', async () => {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') startListening();
            });
        } else {
            // Android / desktop — no permission needed, start immediately
            startListening();
        }
    </script>
</body>
</html>
