<!DOCTYPE html>
<html>
<head>
    <title>Tilt Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            gap: 50px;
        }

        .eye {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transform: scaleY(0.05);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .eye.open { transform: scaleY(1); }

        .pupil {
            width: 44px;
            height: 44px;
            background: #111;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.25s ease;
        }

        #start {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
            font-family: sans-serif;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="eye" id="leftEye"><div class="pupil" id="leftPupil"></div></div>
    <div class="eye" id="rightEye"><div class="pupil" id="rightPupil"></div></div>
    <div id="start">tap to start</div>

    <script>
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const leftPupil = document.getElementById('leftPupil');
        const rightPupil = document.getElementById('rightPupil');

        let awake = false;
        let sleepTimer = null;
        let lookTimer = null;
        let lastBeta = null;
        let lastGamma = null;

        function setPupils(x, y) {
            const t = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            leftPupil.style.transform = t;
            rightPupil.style.transform = t;
        }

        function scheduleLook() {
            clearTimeout(lookTimer);
            lookTimer = setTimeout(() => {
                if (!awake) return;
                const max = 22;
                setPupils(
                    (Math.random() * 2 - 1) * max,
                    (Math.random() * 2 - 1) * max
                );
                scheduleLook();
            }, 400 + Math.random() * 1200);
        }

        function wakeUp() {
            clearTimeout(sleepTimer);
            if (!awake) {
                awake = true;
                setPupils(0, 0);
                leftEye.classList.add('open');
                rightEye.classList.add('open');
                scheduleLook();
            }
            sleepTimer = setTimeout(sleep, 1000 + Math.random() * 9000);
        }

        function sleep() {
            awake = false;
            clearTimeout(lookTimer);
            setPupils(0, 0);
            leftEye.classList.remove('open');
            rightEye.classList.remove('open');
        }

        function handleOrientation(event) {
            if (lastBeta === null) {
                lastBeta = event.beta;
                lastGamma = event.gamma;
                return;
            }
            const db = Math.abs(event.beta - lastBeta);
            const dg = Math.abs(event.gamma - lastGamma);
            lastBeta = event.beta;
            lastGamma = event.gamma;

            if (db > 1 || dg > 1) wakeUp();
        }

        document.getElementById('start').addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') return;
            }
            window.addEventListener('deviceorientation', handleOrientation);
            document.getElementById('start').remove();
        });
    </script>
</body>
</html>
